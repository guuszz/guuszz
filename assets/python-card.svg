  <g transform="translate(50, 90)">
    <path d="M 30 0 C 14 0 14 8 14 18 L 14 32 L 32 32 L 32 36 L 6 36 C -4 36 -12 42 -12 60 C -12 78 -4 84 6 84 L 14 84 L 14 70 C 14 60 22 54 32 54 L 50 54 C 58 54 64 48 64 40 L 64 18 C 64 8 56 0 46 0 Z M 22 8 C 26 8 28 10 28 14 C 28 18 26 20 22 20 C 18 20 16 18 16 14 C 16 10 18 8 22 8 Z" fill="#306998"/>
    <path d="M 70 96 C 86 96 86 88 86 78 L 86 64 L 68 64 L 68 60 L 94 60 C 104 60 112 54 112 36 C 112 18 104 12 94 12 L 86 12 L 86 26 C 86 36 78 42 68 42 L 50 42 C 42 42 36 48 36 56 L 36 78 C 36 88 44 96 54 96 Z M 78 88 C 74 88 72 86 72 82 C 72 78 74 76 78 76 C 82 76 84 78 84 82 C 84 86 82 88 78 88 Z" fill="#FFD43B"/>
  </g>

  <!-- Texto -->
  <g transform="translate(180, 120)">
