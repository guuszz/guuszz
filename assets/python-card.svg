      <rect x="90" width="100" height="24" rx="4" fill="#1f1f1f" stroke="#2a2a3a"/>
      <text x="140" y="16" text-anchor="middle" fill="#a3e635" font-family="ui-monospace, monospace" font-size="11">algorithms</text>
      <rect x="200" width="120" height="24" rx="4" fill="#1f1f1f" stroke="#2a2a3a"/>
